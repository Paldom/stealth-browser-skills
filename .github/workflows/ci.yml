name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # For maximum supply-chain safety, pin actions to full commit SHAs
      # (dependabot.yml keeps both actions and pip pins fresh).
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate skills, evals, and plugin manifests
        run: python3 scripts/validate_skills.py
      - name: Validate GitHub workflow files
        run: |
          pip install --quiet -r requirements-dev.txt
          check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml

  # Mirrors what skills.sh consumers run: discoverability + a real install.
  skills-sh:
    runs-on: ubuntu-latest
    env:
      DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Verify skills.sh discoverability and installability
        run: |
          if ! ls skills/*/SKILL.md >/dev/null 2>&1; then
            echo "no distributed skills yet - skipping skills.sh checks"
            exit 0
          fi
          python3 -c "import json; json.load(open('skills.sh.json'))"
          # Validation-only tool; pinned for reproducibility (bump deliberately).
          npx -y skills@1.5.14 add . --list
          mkdir -p /tmp/skills-smoke && cd /tmp/skills-smoke
          npx -y skills@1.5.14 add "$GITHUB_WORKSPACE" --skill '*' -a claude-code -y
          npx -y skills@1.5.14 list -a claude-code
